name: Collection Distributor

# Transfers LUNC from COLLECTION_WALLET to DAILY/WEEKLY pools
# for each activated NFT that hasn't been distributed yet.
# Runs every 10 minutes + manual trigger.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: collection-distributor
  cancel-in-progress: false

jobs:
  distribute:
    name: Distribute Collection Funds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @cosmjs/proto-signing @cosmjs/stargate @cosmjs/crypto

      - name: Run distributor
        env:
          OPERATOR_MNEMONIC_COLLECTION: ${{ secrets.OPERATOR_MNEMONIC_COLLECTION }}
          DRAW_WORKER_URL: https://oracle-draw.vladislav-baydan.workers.dev
          DISTRIBUTION_SECRET: ${{ secrets.DISTRIBUTION_SECRET }}
        run: node collection-distributor.js
