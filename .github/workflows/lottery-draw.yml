name: Lottery Classic — Auto Draw

on:
  schedule:
    # Daily draw: 20:00 UTC every day EXCEPT Monday (Monday runs weekly instead)
    - cron: '0 20 * * 0,2,3,4,5,6'
    # Weekly draw: 20:00 UTC every Monday
    - cron: '0 20 * * 1'
  workflow_dispatch:
    inputs:
      draw_type:
        description: 'Draw type'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

jobs:
  daily-draw:
    name: Daily Lottery Draw
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 20 * * 0,2,3,4,5,6') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.draw_type == 'daily')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @cosmjs/proto-signing @cosmjs/stargate @cosmjs/crypto

      - name: Run daily draw
        env:
          DRAW_TYPE: daily
          OPERATOR_MNEMONIC_DAILY: ${{ secrets.OPERATOR_MNEMONIC_DAILY }}
          DRAW_WORKER_URL: https://oracle-draw.vladislav-baydan.workers.dev
          DISTRIBUTION_SECRET: ${{ secrets.DISTRIBUTION_SECRET }}
        run: node lottery-draw.js

      - name: Commit winners.json
        run: |
          git config user.name  "Lottery Bot"
          git config user.email "lottery-bot@lottery-classic.io"
          git add winners.json
          git diff --staged --quiet || git commit -m "🎰 Daily draw result — $(date -u +'%Y-%m-%d')"
          git push

  weekly-draw:
    name: Weekly Lottery Draw
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 20 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.draw_type == 'weekly')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @cosmjs/proto-signing @cosmjs/stargate @cosmjs/crypto

      - name: Run weekly draw
        env:
          DRAW_TYPE: weekly
          OPERATOR_MNEMONIC_WEEKLY: ${{ secrets.OPERATOR_MNEMONIC_WEEKLY }}
          DRAW_WORKER_URL: https://oracle-draw.vladislav-baydan.workers.dev
          DISTRIBUTION_SECRET: ${{ secrets.DISTRIBUTION_SECRET }}
        run: node lottery-draw.js

      - name: Commit winners.json
        run: |
          git config user.name  "Lottery Bot"
          git config user.email "lottery-bot@lottery-classic.io"
          git add winners.json
          git diff --staged --quiet || git commit -m "🏆 Weekly draw result — $(date -u +'%Y-%m-%d')"
          git push
