name: Lottery Classic — Auto Draw

on:
  schedule:
    # Every day at 20:00 UTC — script itself decides daily vs weekly based on day of week
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      draw_type:
        description: 'Draw type'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

jobs:
  lottery-draw:
    name: Lottery Draw (daily or weekly)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @cosmjs/proto-signing @cosmjs/stargate @cosmjs/crypto

      - name: Determine draw type
        id: draw_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.draw_type }}" >> $GITHUB_OUTPUT
          else
            # Monday (UTC) = weekly, all other days = daily
            DAY=$(date -u +%u)
            if [ "$DAY" = "1" ]; then
              echo "type=weekly" >> $GITHUB_OUTPUT
            else
              echo "type=daily" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run draw
        env:
          DRAW_TYPE: ${{ steps.draw_type.outputs.type }}
          OPERATOR_MNEMONIC_DAILY: ${{ secrets.OPERATOR_MNEMONIC_DAILY }}
          OPERATOR_MNEMONIC_WEEKLY: ${{ secrets.OPERATOR_MNEMONIC_WEEKLY }}
          DRAW_WORKER_URL: https://oracle-draw.vladislav-baydan.workers.dev
          DISTRIBUTION_SECRET: ${{ secrets.DISTRIBUTION_SECRET }}
        run: |
          echo "Draw type: $DRAW_TYPE"
          node lottery-draw.js

      - name: Commit winners.json
        run: |
          git config user.name  "Lottery Bot"
          git config user.email "lottery-bot@oracle-draw.io"
          git add winners.json
          git diff --staged --quiet || git commit -m "🎰 ${{ steps.draw_type.outputs.type }} draw — $(date -u +'%Y-%m-%d')"
          git push
