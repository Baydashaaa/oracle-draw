<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname;
    var validTabs = ['home','draw','winners','verify','bag'];
    var tab = path.replace(/^\//, '') || 'home';
    if (!validTabs.includes(tab)) tab = 'home';
    try { localStorage.setItem('spa-tab', tab); } catch(e) {}
    window.location.replace('/?_=' + Date.now());
  </script>
</head>
<body></body>
</html>
