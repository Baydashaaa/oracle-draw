<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname;
    var validTabs = ['home','draw','winners','verify','bag'];
    var tab = path.replace(/^\//, '') || 'home';
    if (!validTabs.includes(tab)) tab = 'home';
    sessionStorage.setItem('spa-redirect-tab', tab);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
